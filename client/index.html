<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <meta property="og:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta property="og:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta name="twitter:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Google Fonts: Tajawal, Almarai, Montserrat, Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Global Loading Screen - Pure CSS Decor (Arched Cabinet) -->
  <div id="global-loader"></div>

  <style>
    /* Full body reset during load */
    body {
      margin: 0;
    }

    #global-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: transparent;
      /* No black background */
    }

    #global-loader.hidden {
      visibility: hidden;
      transition: visibility 0s linear 3s;
    }

    /* 10 Pieces of the Loading Screen */
    .piece {
      position: absolute;
      width: 50vw;
      height: 20vh;
      overflow: hidden;
      /* Slow, cinematic ease-in-out */
      transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
    }

    /* Col positions */
    .piece-c1 {
      left: 0;
    }

    .piece-c2 {
      left: 50vw;
    }

    /* Row positions */
    .piece-r1 {
      top: 0;
    }

    .piece-r2 {
      top: 20vh;
    }

    .piece-r3 {
      top: 40vh;
    }

    .piece-r4 {
      top: 60vh;
    }

    .piece-r5 {
      top: 80vh;
    }

    /* Shifts for the decor wrapper inside each piece to perfectly align the single design */
    .decor-wrapper {
      position: absolute;
      width: 100vw;
      height: 100vh;
    }

    .piece-c1 .decor-wrapper {
      left: 0;
    }

    .piece-c2 .decor-wrapper {
      left: -50vw;
    }

    .piece-r1 .decor-wrapper {
      top: 0;
    }

    .piece-r2 .decor-wrapper {
      top: -20vh;
    }

    .piece-r3 .decor-wrapper {
      top: -40vh;
    }

    .piece-r4 .decor-wrapper {
      top: -60vh;
    }

    .piece-r5 .decor-wrapper {
      top: -80vh;
    }

    /* Loaded transforms - moving panels out of view */
    #global-loader.loaded .piece-c1 {
      transform: translateX(-100%);
    }

    #global-loader.loaded .piece-c2 {
      transform: translateX(100%);
    }

    /* Sequence delays: 1-2-2-2-2-1 diagonal ripple opening */
    #global-loader.loaded .piece-r3.piece-c1 {
      transition-delay: 0.0s;
    }

    #global-loader.loaded .piece-r3.piece-c2,
    #global-loader.loaded .piece-r2.piece-c1 {
      transition-delay: 0.15s;
    }

    #global-loader.loaded .piece-r2.piece-c2,
    #global-loader.loaded .piece-r4.piece-c1 {
      transition-delay: 0.30s;
    }

    #global-loader.loaded .piece-r4.piece-c2,
    #global-loader.loaded .piece-r1.piece-c1 {
      transition-delay: 0.45s;
    }

    #global-loader.loaded .piece-r1.piece-c2,
    #global-loader.loaded .piece-r5.piece-c1 {
      transition-delay: 0.60s;
    }

    #global-loader.loaded .piece-r5.piece-c2 {
      transition-delay: 0.75s;
    }


    /* --- THE PURE CSS DECOR ART --- */

    .decor-wall {
      width: 100vw;
      height: 100vh;
      background-color: #f7f8f4;
      /* light creamy wall */
      display: flex;
      justify-content: center;
      align-items: flex-end;
      /* Arch is grounded at bottom */
      /* Full shadow to separate from website underneath before opening */
      box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.1);
    }

    .decor-arch {
      width: 85vw;
      max-width: 550px;
      height: 90vh;
      /* Sit slightly short of ceiling */
      background-color: #d1ead4;
      /* pale green inner wall */
      border-top-left-radius: 400px;
      /* Overshoot to ensure perfect semi-circle cap */
      border-top-right-radius: 400px;
      box-shadow: inset 0 20px 40px rgba(0, 0, 0, 0.15), inset 0 0 15px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      /* Add wall border frame to separate arch from wall */
      border: 12px solid #e7ebe1;
      border-bottom: none;
    }

    /* The dark green fluted dome at the top of the arch */
    .arch-dome {
      height: 25%;
      min-height: 120px;
      background-color: #123e23;
      background-image: repeating-linear-gradient(90deg,
          rgba(0, 0, 0, 0.15) 0px,
          rgba(0, 0, 0, 0.15) 8px,
          transparent 8px,
          transparent 20px);
      border-bottom: 6px solid #0b2b18;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 10;
    }

    /* Gold LUX BOX text on dome */
    .arch-text {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 700;
      color: #dfbea1;
      letter-spacing: 5px;
      margin: 0;
      text-transform: uppercase;
      animation: gold-shimmer 2.5s infinite ease-in-out;
      background: linear-gradient(to right, #cfab67, #ffe5a3, #cfab67);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6));
    }

    @keyframes gold-shimmer {

      0%,
      100% {
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6)) drop-shadow(0 0 5px rgba(255, 229, 163, 0.2));
      }

      50% {
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6)) drop-shadow(0 0 20px rgba(255, 229, 163, 0.7));
      }
    }

    /* Shelves Area container */
    .arch-shelves {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: 15px 0 30px;
    }

    /* Individual shelf */
    .shelf-row {
      position: relative;
      width: 86%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    /* Glow above shelf board */
    .shelf-glow {
      position: absolute;
      bottom: 25px;
      /* right above the board */
      left: 0;
      width: 100%;
      height: 40px;
      background: linear-gradient(to top, rgba(255, 255, 255, 0.4), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .products {
      display: flex;
      justify-content: space-evenly;
      /* spread products out */
      align-items: flex-end;
      height: 45px;
      padding: 0 20px;
      position: relative;
      z-index: 5;
    }

    /* Shelf solid board */
    .shelf-board {
      height: 16px;
      background-color: #123e23;
      border-radius: 3px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.1);
      position: relative;
      z-index: 2;
    }

    /* LED Strip under the board */
    .shelf-led {
      height: 3px;
      background-color: #fff;
      width: 95%;
      margin: 0 auto;
      box-shadow: 0 5px 15px 2px rgba(255, 255, 255, 0.9), 0 10px 30px 5px rgba(255, 255, 255, 0.5);
      border-radius: 0 0 4px 4px;
      position: relative;
      z-index: 1;
    }

    /* --- Vapes / Products CSS Art --- */
    .prod {
      width: 16px;
      /* styled like sleak perfume/vape boxes */
      border-top-left-radius: 2px;
      border-top-right-radius: 2px;
      box-shadow: -2px 2px 4px rgba(0, 0, 0, 0.3);
      position: relative;
      margin: 0 2px;
    }

    /* Small black cap on top of vapes */
    .prod::after {
      content: '';
      position: absolute;
      top: -4px;
      left: 15%;
      width: 70%;
      height: 4px;
      background-color: #111;
      border-radius: 1px 1px 0 0;
      border-top: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* Product color schemes simulating boxes */
    .p1 {
      height: 35px;
      background: linear-gradient(to top, #111, #444);
      border-top: 1px solid #777;
    }

    /* Black box */
    .p2 {
      height: 32px;
      background: linear-gradient(to top, #1b5e20, #4caf50);
    }

    /* Green box */
    .p3 {
      height: 28px;
      background: linear-gradient(to top, #880e4f, #f06292);
    }

    /* Pink box */
    .p4 {
      height: 30px;
      background: linear-gradient(to top, #01579b, #29b6f6);
    }

    /* Blue box */
    .p5 {
      height: 36px;
      background: linear-gradient(to top, #e65100, #ffb74d);
    }

    /* Orange box */
    .p6 {
      height: 31px;
      background: linear-gradient(to top, #311b92, #9575cd);
    }

    /* Purple box */

    /* Add little logo circle to product boxes for realism */
    .prod::before {
      content: '';
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 2px rgba(255, 255, 255, 0.5);
    }
  </style>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Script to programmatically generate the 10-panel cinematic CSS Art loader -->
  <script>
    (function () {
      // Product distributions per shelf to make it look realistic and organic
      const shelfItems = [
        ['p1', 'p2', 'p3', 'p1', 'p4', 'p2', 'p6'],
        ['p4', 'p6', 'p5', 'p2', 'p1', 'p3', 'p4'],
        ['p3', 'p1', 'p2', 'p6', 'p5', 'p1', 'p2'],
        ['p2', 'p2', 'p4', 'p3', 'p1', 'p6', 'p5'],
        ['p5', 'p4', 'p3', 'p6', 'p1', 'p2', 'p1']
      ];

      let shelvesHTML = '';
      shelfItems.forEach(shelf => {
        let prods = shelf.map(p => '<div class="prod ' + p + '"></div>').join('');
        shelvesHTML +=
          '<div class="shelf-row">' +
          '<div class="shelf-glow"></div>' +
          '<div class="products">' + prods + '</div>' +
          '<div class="shelf-board"></div>' +
          '<div class="shelf-led"></div>' +
          '</div>';
      });

      // HTML template for the actual arched cabinet decor
      const designHTML =
        '<div class="decor-wrapper">' +
        '<div class="decor-wall">' +
        '<div class="decor-arch">' +
        '<div class="arch-dome">' +
        '<h1 class="arch-text">LUX BOX</h1>' +
        '</div>' +
        '<div class="arch-shelves">' +
        shelvesHTML +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>';

      const loaderContainer = document.getElementById('global-loader');

      if (loaderContainer) {
        // Generate the 10 grid pieces exactly seamlessly
        // No borders so they act as a single piece initially
        for (let r = 1; r <= 5; r++) {
          for (let c = 1; c <= 2; c++) {
            const piece = document.createElement('div');
            piece.className = 'piece piece-r' + r + ' piece-c' + c;
            piece.innerHTML = designHTML;
            loaderContainer.appendChild(piece);
          }
        }

        // Wait to trigger animation so user can see the beautiful CSS decor!
        window.addEventListener('load', function () {
          // Give user 1.2s to enjoy the design
          setTimeout(() => {
            loaderContainer.classList.add('loaded');
            // Longest delay (0.75s) + animation (1.2s) = 1.95s
            // Remove from DOM safely after 2.1s
            setTimeout(() => {
              loaderContainer.classList.add('hidden');
              loaderContainer.remove();
            }, 2100);
          }, 1200);
        });
      }
    })();
  </script>
</body>

</html>
