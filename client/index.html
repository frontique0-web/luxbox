<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <meta property="og:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta property="og:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta name="twitter:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Google Fonts: Tajawal, Almarai, Montserrat, Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Global Loading Screen -->
  <div id="global-loader" class="split-loader">
    <!-- Left Door (Half of the shelf) -->
    <!-- You can replace the background image below with your own shelf image -->
    <div class="split-door split-door-left">
      <div class="shelf-overlay"></div>
    </div>

    <!-- Right Door (Half of the shelf) -->
    <div class="split-door split-door-right">
      <div class="shelf-overlay"></div>
    </div>

    <!-- Center Content -->
    <div class="split-loader-content" id="loader-content">
      <div class="loader-logo-container">
        <!-- Animated Golden Rings -->
        <div class="golden-rings">
          <div class="ring-outer"></div>
          <div class="ring-inner"></div>
          <div class="diamond-center"></div>
        </div>
      </div>
      <h1 class="loader-title">Lux Box</h1>
      <p class="loader-subtitle" dir="rtl">جاري تجهيز الفخامة...</p>
    </div>

    <style>
      .split-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        visibility: visible;
        overflow: hidden;
        background-color: transparent;
        /* Let the doors cover everything */
      }

      .split-loader.hidden {
        visibility: hidden;
        transition: visibility 0s linear 1.5s;
        /* Hide completely after doors open */
      }

      .split-door {
        position: absolute;
        top: 0;
        width: 50vw;
        height: 100vh;
        /* Default styling for the shelves. Replace linear-gradient/url with your own shelf image if needed */
        background-color: #0B281F;
        background-image: linear-gradient(rgba(11, 40, 31, 0.85), rgba(11, 40, 31, 0.95)), url('/assets/marble-bg.png');
        background-size: 100vw 100vh;
        /* Ensure the image is continuous across both doors */
        background-attachment: fixed;
        background-repeat: no-repeat;
        transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
        z-index: 1;
        box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.6);
      }

      /* Subtle CSS shelf lines for aesthetics */
      .shelf-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 48%, rgba(212, 175, 55, 0.15) 49%, rgba(212, 175, 55, 0.4) 50%, rgba(0, 0, 0, 0.5) 51%, transparent 53%);
        background-size: 100% 25vh;
        /* Creates 4 shelf divisions */
        pointer-events: none;
      }

      .split-door-left {
        left: 0;
        background-position: left center;
        border-right: 2px solid #D4AF37;
      }

      .split-door-right {
        right: 0;
        background-position: right center;
        border-left: 2px solid transparent;
        /* The left door already has the border, but we can add a subtle shadow */
        box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(0, 0, 0, 0.6);
      }

      /* When the page loads, the doors slide open */
      .split-loader.loaded .split-door-left {
        transform: translateX(-100%);
      }

      .split-loader.loaded .split-door-right {
        transform: translateX(100%);
      }

      .split-loader-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        width: 100%;
        padding: 0 20px;
      }

      /* Fade out and gently pull back the logo/text before doors fully open */
      .split-loader.loaded .split-loader-content {
        opacity: 0;
        transform: translate(-50%, -55%) scale(0.95);
        filter: blur(4px);
      }

      .golden-rings {
        position: relative;
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
      }

      .ring-outer {
        position: absolute;
        inset: 0;
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 50%;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
      }

      .ring-inner {
        position: absolute;
        inset: 0;
        border: 2px solid transparent;
        border-top-color: #D4AF37;
        border-left-color: #D4AF37;
        border-radius: 50%;
        animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      }

      .diamond-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(45deg);
        width: 14px;
        height: 14px;
        background-color: #D4AF37;
        animation: pulse 2s ease-in-out infinite;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
      }

      .loader-title {
        font-family: 'Playfair Display', serif;
        color: #D4AF37;
        font-size: 32px;
        letter-spacing: 0.2em;
        margin: 0;
        font-weight: 600;
        text-transform: uppercase;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
      }

      .loader-subtitle {
        font-family: 'Tajawal', sans-serif;
        color: rgba(255, 255, 255, 0.8);
        font-size: 15px;
        margin-top: 12px;
        letter-spacing: 0.1em;
        font-weight: 300;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {

        0%,
        100% {
          transform: translate(-50%, -50%) rotate(45deg) scale(0.85);
          opacity: 0.8;
        }

        50% {
          transform: translate(-50%, -50%) rotate(45deg) scale(1.15);
          opacity: 1;
          box-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
        }
      }
    </style>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Script to trigger the cinematic split -->
  <script>
    window.addEventListener('load', function () {
      const loader = document.getElementById('global-loader');
      if (loader) {
        // A slight delay to let the user admire the loading screen before opening
        setTimeout(() => {
          loader.classList.add('loaded');
          // Remove from DOM after the transition duration (1.2s) + safe buffer
          setTimeout(() => {
            loader.classList.add('hidden');
            loader.remove();
          }, 1500);
        }, 300);
      }
    });
  </script>
</body>

</html>
