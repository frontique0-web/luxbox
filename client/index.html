<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <meta property="og:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta property="og:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta name="twitter:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Google Fonts: Tajawal, Almarai, Montserrat, Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="global-loader">
    <div id="lux-loading-overlay">
      <div class="lux-logo-container">
        <!-- Optional: Replace with actual logo image later if desired -->
        <h1 class="lux-loading-logo-text">LUX BOX</h1>
      </div>
      <div class="lux-progress-container">
        <div class="lux-progress-bar"></div>
      </div>
      <div class="lux-loading-text">جاري تحميل المعرض...</div>
    </div>
  </div>

  <style>
    /* Full body reset during load */
    body {
      margin: 0;
      background-color: #061811;
      /* Match the dark theme background */
    }

    #global-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: radial-gradient(circle at center, #0B2A1E 0%, #061811 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1.2s cubic-bezier(0.85, 0, 0.15, 1), transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
      transform-origin: top center;
    }

    #global-loader.hidden {
      opacity: 0;
      transform: scale(1.05);
      /* Slight zoom out effect on leaving */
      pointer-events: none;
    }

    #lux-loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #D4AF37;
      font-family: 'Playfair Display', 'Almarai', serif;
      width: 100%;
      max-width: 400px;
      padding: 0 20px;
    }

    .lux-logo-container {
      margin-bottom: 40px;
      text-align: center;
    }

    .lux-loading-logo-text {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 8px;
      margin: 0;
      text-transform: uppercase;
      background: linear-gradient(to bottom, #f9e1b2 0%, #d5ae60 40%, #a67c00 50%, #d5ae60 60%, #fff6d9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6));
      animation: lux-float 4s ease-in-out infinite;
    }

    /* Minimalist Loading Text */
    .lux-loading-text {
      font-family: 'Almarai', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      margin-top: 20px;
      color: rgba(212, 175, 55, 0.7);
      animation: lux-pulse 2s ease-in-out infinite;
    }

    /* Premium Progress Line at Bottom */
    .lux-progress-container {
      width: 80%;
      height: 2px;
      background-color: rgba(212, 175, 55, 0.1);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .lux-progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
      border-radius: 2px;
      animation: lux-slide 1.5s ease-in-out infinite;
    }

    @keyframes lux-slide {
      0% {
        left: -40%;
        width: 30%;
      }

      50% {
        left: 20%;
        width: 80%;
      }

      100% {
        left: 110%;
        width: 30%;
      }
    }

    @keyframes lux-pulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes lux-float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }
  </style>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    // Define a global function for React to call when ready
    window.hideLuxLoader = function () {
      const loader = document.getElementById('global-loader');
      if (loader) {
        loader.classList.add('hidden');
        setTimeout(() => {
          loader.remove();
        }, 1500); // Wait for transition to finish
      }
    };

    // Fallback: If React fails to load within 12 seconds, hide it anyway
    setTimeout(() => {
      window.hideLuxLoader();
    }, 12000);
  </script>
</body>

</html>
