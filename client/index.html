<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <meta property="og:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta property="og:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta name="twitter:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Google Fonts: Tajawal, Almarai, Montserrat, Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="global-loader">
    <!-- Content injected via JS below for the 40-panel transition -->
  </div>

  <style>
    /* Full body reset during load */
    body {
      margin: 0;
      background-color: #061811;
      overflow: hidden;
      /* Prevent scrollbar during generation */
    }

    #global-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: transparent;
      pointer-events: all;
    }

    #global-loader.hidden {
      visibility: hidden;
      transition: visibility 0s linear 2s;
    }

    /* 40 Pieces of the Loading Screen (20 Rows x 2 Cols) */
    .piece {
      position: absolute;
      width: 50.5vw;
      height: 5.5vh;
      overflow: hidden;
      /* Slow, cinematic ease-in-out */
      transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
    }

    /* Col positions */
    .piece-c1 {
      left: 0;
    }

    .piece-c2 {
      left: 50vw;
    }

    /* Shifts for the decor wrapper inside each piece to perfectly align the single design */
    .decor-wrapper {
      position: absolute;
      width: 100vw;
      height: 100vh;
    }

    .piece-c1 .decor-wrapper {
      left: 0;
    }

    .piece-c2 .decor-wrapper {
      left: -50vw;
    }

    /* Loaded transforms - moving panels out of view */
    /* Only 2 columns - left moves left, right moves right */
    #global-loader.loaded .piece-c1 {
      transform: translateX(-100%);
    }

    #global-loader.loaded .piece-c2 {
      transform: translateX(100%);
    }

    /* The actual design inside the wrapper */
    .decor-wall {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #0B2A1E 0%, #061811 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* Adding a tiny bit of shadow at the cut seams */
      box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.2);
    }

    #lux-loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #D4AF37;
      font-family: 'Playfair Display', 'Almarai', serif;
      width: 100%;
      max-width: 400px;
      padding: 0 20px;
    }

    .lux-brand-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 40px;
      animation: lux-float 4s ease-in-out infinite;
    }

    /* Using actual logos with gold gradient masks */
    .lux-brand-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(to bottom, #f9e1b2 0%, #d5ae60 40%, #a67c00 50%, #d5ae60 60%, #fff6d9 100%);
      -webkit-mask-image: url('/logo.png');
      -webkit-mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-image: url('/logo.png');
      mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6));
    }

    .lux-brand-text {
      width: 160px;
      height: 36px;
      background: linear-gradient(to bottom, #f9e1b2 0%, #d5ae60 40%, #a67c00 50%, #d5ae60 60%, #fff6d9 100%);
      -webkit-mask-image: url('/logo-text.png');
      -webkit-mask-size: contain;
      -webkit-mask-repeat: no-repeat;
      -webkit-mask-position: center;
      mask-image: url('/logo-text.png');
      mask-size: contain;
      mask-repeat: no-repeat;
      mask-position: center;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6));
    }

    /* Minimalist Loading Text */
    .lux-loading-text {
      font-family: 'Almarai', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      margin-top: 20px;
      color: rgba(212, 175, 55, 0.7);
      animation: lux-pulse 2s ease-in-out infinite;
    }

    /* Premium Progress Line at Bottom */
    .lux-progress-container {
      width: 80%;
      height: 2px;
      background-color: rgba(212, 175, 55, 0.1);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .lux-progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, transparent, #D4AF37, transparent);
      border-radius: 2px;
      animation: lux-slide 1.5s ease-in-out infinite;
    }

    @keyframes lux-slide {
      0% {
        left: -40%;
        width: 30%;
      }

      50% {
        left: 20%;
        width: 80%;
      }

      100% {
        left: 110%;
        width: 30%;
      }
    }

    @keyframes lux-pulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes lux-float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }
  </style>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <script>
    (function () {
      // HTML template for the clean background wall that holds the logo and progress bar
      const designHTML = `
        <div class="decor-wrapper">
          <div class="decor-wall">
            <div id="lux-loading-overlay">
              <div class="lux-brand-wrapper">
                <div class="lux-brand-icon"></div>
                <div class="lux-brand-text"></div>
              </div>
              <div class="lux-progress-container">
                <div class="lux-progress-bar"></div>
              </div>
              <div class="lux-loading-text">جاري تحميل المعرض...</div>
            </div>
          </div>
        </div>
      `;

      const loaderContainer = document.getElementById('global-loader');

      if (loaderContainer) {
        // Generate dynamic CSS for 20 rows
        let dynCss = '';
        const rows = 20;
        for (let r = 1; r <= rows; r++) {
          let topOffset = (r - 1) * 5;
          dynCss += `.piece-r${r} { top: ${topOffset}vh !important; }\n`;
          dynCss += `.piece-r${r} .decor-wrapper { top: -${topOffset}vh !important; }\n`;

          // Cinematic ripple delay: from center outwards
          let center1 = rows / 2;
          let center2 = (rows / 2) + 1;
          let distance = Math.min(Math.abs(r - center1), Math.abs(r - center2));
          let delay = distance * 0.04;
          dynCss += `#global-loader.loaded .piece-r${r} { transition-delay: ${delay.toFixed(2)}s !important; }\n`;
        }
        const styleEl = document.createElement('style');
        styleEl.innerHTML = dynCss;
        loaderContainer.appendChild(styleEl);

        // Generate the 40 grid pieces flawlessly
        for (let r = 1; r <= rows; r++) {
          for (let c = 1; c <= 2; c++) {
            const piece = document.createElement('div');
            piece.className = 'piece piece-r' + r + ' piece-c' + c;
            piece.innerHTML = designHTML;
            loaderContainer.appendChild(piece);
          }
        }

        // Define a global function for React to call when ready
        window.hideLuxLoader = function () {
          if (loaderContainer.classList.contains('loaded')) return;

          loaderContainer.classList.add('loaded');

          // Longest delay is (10 * 0.04s) = 0.4s. Plus 1.2s animation = 1.6s
          setTimeout(() => {
            loaderContainer.classList.add('hidden');
            loaderContainer.remove();
            document.body.style.overflow = ''; // Restore body scrolling
          }, 1800);
        };

        // Fallback: If React fails to load within 12 seconds
        setTimeout(() => {
          if (window.hideLuxLoader) window.hideLuxLoader();
        }, 12000);
      }
    })();
  </script>
</body>

</html>
