<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <meta property="og:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta property="og:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta name="twitter:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Google Fonts: Tajawal, Almarai, Montserrat, Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Global Loading Screen - 3D Pure CSS Decor (Arched Cabinet) -->
  <div id="global-loader"></div>

  <style>
    /* Full body reset during load */
    body {
      margin: 0;
    }

    #global-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: transparent;
    }

    #global-loader.hidden {
      visibility: hidden;
      transition: visibility 0s linear 3.5s;
    }

    /* 40 Pieces of the Loading Screen (20 Rows x 2 Cols) */
    .piece {
      position: absolute;
      width: 50vw;
      height: 5vh;
      overflow: hidden;
      /* Slow, cinematic ease-in-out */
      transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
    }

    /* Col positions */
    .piece-c1 {
      left: 0;
    }

    .piece-c2 {
      left: 50vw;
    }

    /* Row positions */
    .piece-r1 {
      top: 0;
    }

    .piece-r2 {
      top: 10vh;
    }

    .piece-r3 {
      top: 20vh;
    }

    .piece-r4 {
      top: 30vh;
    }

    .piece-r5 {
      top: 40vh;
    }

    .piece-r6 {
      top: 50vh;
    }

    .piece-r7 {
      top: 60vh;
    }

    .piece-r8 {
      top: 70vh;
    }

    .piece-r9 {
      top: 80vh;
    }

    .piece-r10 {
      top: 90vh;
    }

    /* Shifts for the decor wrapper inside each piece to perfectly align the single design */
    .decor-wrapper {
      position: absolute;
      width: 100vw;
      height: 100vh;
    }

    .piece-c1 .decor-wrapper {
      left: 0;
    }

    .piece-c2 .decor-wrapper {
      left: -50vw;
    }

    .piece-r1 .decor-wrapper {
      top: 0;
    }

    .piece-r2 .decor-wrapper {
      top: -10vh;
    }

    .piece-r3 .decor-wrapper {
      top: -20vh;
    }

    .piece-r4 .decor-wrapper {
      top: -30vh;
    }

    .piece-r5 .decor-wrapper {
      top: -40vh;
    }

    .piece-r6 .decor-wrapper {
      top: -50vh;
    }

    .piece-r7 .decor-wrapper {
      top: -60vh;
    }

    .piece-r8 .decor-wrapper {
      top: -70vh;
    }

    .piece-r9 .decor-wrapper {
      top: -80vh;
    }

    .piece-r10 .decor-wrapper {
      top: -90vh;
    }

    /* Loaded transforms - moving panels out of view */
    /* Only 2 columns - left moves left, right moves right */
    #global-loader.loaded .piece-c1 {
      transform: translateX(-100%);
    }

    #global-loader.loaded .piece-c2 {
      transform: translateX(100%);
    }

    /* Sequence delays: Ripple from center outwards for 20 panels */
    #global-loader.loaded .piece-r5,
    #global-loader.loaded .piece-r6 {
      transition-delay: 0.0s;
    }

    #global-loader.loaded .piece-r4,
    #global-loader.loaded .piece-r7 {
      transition-delay: 0.1s;
    }

    #global-loader.loaded .piece-r3,
    #global-loader.loaded .piece-r8 {
      transition-delay: 0.2s;
    }

    #global-loader.loaded .piece-r2,
    #global-loader.loaded .piece-r9 {
      transition-delay: 0.3s;
    }

    #global-loader.loaded .piece-r1,
    #global-loader.loaded .piece-r10 {
      transition-delay: 0.4s;
    }


    /* --- THE 3D PURE CSS DECOR ART --- */

    .decor-wall {
      width: 100vw;
      height: 100vh;
      /* Brand identity dark green gradient */
      background: radial-gradient(circle at center, #0B2A1E 0%, #061811 100%);
      display: flex;
      justify-content: center;
      align-items: flex-end;
      box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.4);
    }

    .decor-arch {
      width: 80vw;
      max-width: 600px;
      height: 92vh;
      /* Deep 3D inner cavity gradient */
      background: linear-gradient(135deg, #a8d1b1 0%, #d1ead4 40%, #8dbb97 100%);
      border-top-left-radius: 400px;
      border-top-right-radius: 400px;
      /* Massive inner shadow to look like a deep alcove */
      box-shadow:
        inset 30px 30px 60px rgba(0, 0, 0, 0.25),
        inset -30px 0px 60px rgba(0, 0, 0, 0.15),
        inset 0px 50px 80px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      /* 3D protruding wall border frame */
      border: 18px solid #f4f7f0;
      border-bottom: none;
      /* Outer shadow cast onto the wall */
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.4));
    }

    /* Soft curved lighting reflection inside the arch */
    .decor-arch::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at top center, rgba(255, 255, 255, 0.4) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* The dark green fluted dome at the top of the arch - Highly 3D */
    .arch-dome {
      height: 28%;
      min-height: 140px;
      background-color: #0c2b18;
      background-image:
        repeating-linear-gradient(90deg,
          rgba(0, 0, 0, 0.4) 0px,
          rgba(0, 0, 0, 0.0) 4px,
          rgba(255, 255, 255, 0.1) 8px,
          rgba(0, 0, 0, 0.4) 12px),
        linear-gradient(to bottom, #071a0e, #144627);
      border-bottom: 8px solid #05140b;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Shadow casting down onto shelves */
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.8);
      position: relative;
      z-index: 10;
    }

    /* Inner lit rim for the dome */
    .arch-dome::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
    }

    /* 3D Gold LUX BOX text */
    .arch-text {
      font-family: 'Playfair Display', serif;
      font-size: 50px;
      font-weight: 800;
      color: #dfbea1;
      letter-spacing: 6px;
      margin: 0;
      text-transform: uppercase;
      /* Metallic 3D text effect */
      background: linear-gradient(to bottom, #f9e1b2 0%, #d5ae60 40%, #a67c00 50%, #d5ae60 60%, #fff6d9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 6px 4px rgba(0, 0, 0, 0.8));
    }

    /* Shelves Area container */
    .arch-shelves {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      padding: 10px 0 40px;
      position: relative;
      z-index: 1;
    }

    /* Individual shelf */
    .shelf-row {
      position: relative;
      width: 90%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    /* Strong LED Glow illuminating the background above the shelf */
    .shelf-glow {
      position: absolute;
      bottom: 22px;
      left: 2%;
      width: 96%;
      height: 60px;
      background: linear-gradient(to top, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.1) 40%, transparent 100%);
      opacity: 0.8;
      pointer-events: none;
      z-index: 0;
    }

    .products {
      display: flex;
      justify-content: space-evenly;
      align-items: flex-end;
      height: 55px;
      padding: 0 30px;
      position: relative;
      z-index: 5;
    }

    /* 3D Shelf solid board */
    .shelf-board {
      height: 20px;
      /* Multi-layered gradient for a chunky, realistic wood/metal look */
      background: linear-gradient(to bottom, #1f5e38 0%, #123e23 30%, #0a2414 100%);
      border-radius: 4px;
      /* Bevel edge and drop shadow */
      box-shadow:
        inset 0 2px 2px rgba(255, 255, 255, 0.3),
        /* Top highlight */
        inset 0 -2px 4px rgba(0, 0, 0, 0.5),
        /* Bottom shading */
        0 10px 15px rgba(0, 0, 0, 0.6);
      /* Drop shadow */
      position: relative;
      z-index: 2;
    }

    /* Vibrant LED Strip mounted under the front edge */
    .shelf-led {
      height: 4px;
      background-color: #fff;
      width: 92%;
      margin: 0 auto;
      /* Intense glow */
      box-shadow:
        0 2px 10px 2px rgba(255, 255, 255, 1),
        0 8px 25px 5px rgba(255, 255, 255, 0.6);
      border-radius: 0 0 6px 6px;
      position: relative;
      z-index: 1;
    }

    /* --- 3D Vapes / Products CSS Art --- */
    .prod {
      width: 18px;
      /* Create a cylindrical/box 3D effect with strong horizontal gradients */
      border-top-left-radius: 3px;
      border-top-right-radius: 3px;
      /* Drop shadow on the shelf */
      box-shadow:
        -4px 4px 6px rgba(0, 0, 0, 0.5),
        -1px 1px 2px rgba(0, 0, 0, 0.8);
      position: relative;
      margin: 0 4px;
      transition: transform 0.3s;
    }

    /* 3D Top Cap/Mouthpiece */
    .prod::after {
      content: '';
      position: absolute;
      top: -6px;
      left: 15%;
      width: 70%;
      height: 6px;
      background: linear-gradient(90deg, #111 0%, #444 30%, #111 100%);
      border-radius: 2px 2px 0 0;
      border-top: 1px solid #777;
      box-shadow: inset 0 2px 2px rgba(255, 255, 255, 0.2);
    }

    /* Bottom metallic base */
    .prod::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #888 0%, #ccc 30%, #555 100%);
      z-index: 2;
    }

    /* Product color schemes simulating 3D painted metal/plastic */
    .p1 {
      height: 40px;
      background: linear-gradient(90deg, #1a1a1a 0%, #3d3d3d 30%, #000 100%);
    }

    /* Space Grey */
    .p2 {
      height: 36px;
      background: linear-gradient(90deg, #1b5e20 0%, #4caf50 30%, #0d3610 100%);
    }

    /* Emerald */
    .p3 {
      height: 32px;
      background: linear-gradient(90deg, #880e4f 0%, #f06292 30%, #4a0328 100%);
    }

    /* Rose Gold */
    .p4 {
      height: 35px;
      background: linear-gradient(90deg, #01579b 0%, #29b6f6 30%, #012d52 100%);
    }

    /* Ocean Blue */
    .p5 {
      height: 42px;
      background: linear-gradient(90deg, #d84315 0%, #ff8a65 30%, #751d02 100%);
    }

    /* Copper */
    .p6 {
      height: 38px;
      background: linear-gradient(90deg, #311b92 0%, #9575cd 30%, #150a47 100%);
    }

    /* Amethyst */
    .p7 {
      height: 45px;
      background: linear-gradient(90deg, #d4af37 0%, #f9f1b2 30%, #997818 100%);
    }

    /* Pure Gold */

    /* Glossy screen/logo indicator on the front */
    .prod-glass {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 12px;
      border-radius: 4px;
      background: linear-gradient(to bottom, #111, #333);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: inset 0 2px 2px rgba(0, 0, 0, 0.8);
      z-index: 1;
    }

    /* Small LED dot inside screen */
    .prod-glass::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background-color: #0f0;
      box-shadow: 0 0 3px #0f0;
    }
  </style>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Script to programmatically generate the 18-panel cinematic CSS Art loader -->
  <script>
    (function () {
      // Dynamic arrays mapping products
      const shelfItems = [
        ['p1', 'p7', 'p3', 'p1', 'p4', 'p2', 'p6', 'p7'],
        ['p4', 'p6', 'p5', 'p7', 'p2', 'p1', 'p3', 'p4'],
        ['p3', 'p1', 'p2', 'p6', 'p5', 'p7', 'p1', 'p2'],
        ['p7', 'p2', 'p4', 'p3', 'p1', 'p6', 'p5', 'p7'],
        ['p5', 'p4', 'p3', 'p7', 'p6', 'p1', 'p2', 'p1']
      ];

      let shelvesHTML = '';
      shelfItems.forEach(shelf => {
        let prods = shelf.map(p => '<div class="prod ' + p + '"><div class="prod-glass"></div></div>').join('');
        shelvesHTML +=
          '<div class="shelf-row">' +
          '<div class="shelf-glow"></div>' +
          '<div class="products">' + prods + '</div>' +
          '<div class="shelf-board"></div>' +
          '<div class="shelf-led"></div>' +
          '</div>';
      });

      // HTML template for the 3D arched cabinet decor
      const designHTML =
        '<div class="decor-wrapper">' +
        '<div class="decor-wall">' +
        '<div class="decor-arch">' +
        '<div class="arch-dome">' +
        '<h1 class="arch-text">LUX BOX</h1>' +
        '</div>' +
        '<div class="arch-shelves">' +
        shelvesHTML +
        '</div>' +
        '</div>' +
        '</div>' +
        '</div>';

      const loaderContainer = document.getElementById('global-loader');

      if (loaderContainer) {
        // Generate dynamic CSS for 20 rows (overrides static block)
        let dynCss = '';
        const rows = 20;
        for (let r = 1; r <= rows; r++) {
          let topOffset = (r - 1) * 5;
          dynCss += `.piece-r${r} { top: ${topOffset}vh !important; }\n`;
          dynCss += `.piece-r${r} .decor-wrapper { top: -${topOffset}vh !important; }\n`;

          let center1 = rows / 2;
          let center2 = (rows / 2) + 1;
          let distance = Math.min(Math.abs(r - center1), Math.abs(r - center2));
          let delay = distance * 0.04;
          dynCss += `#global-loader.loaded .piece-r${r} { transition-delay: ${delay.toFixed(2)}s !important; }\n`;
        }
        const styleEl = document.createElement('style');
        styleEl.innerHTML = dynCss;
        loaderContainer.appendChild(styleEl); // Overrides old static CSS and cleans up automatically

        // Generate the 40 grid pieces flawlessly
        for (let r = 1; r <= rows; r++) {
          for (let c = 1; c <= 2; c++) {
            const piece = document.createElement('div');
            piece.className = 'piece piece-r' + r + ' piece-c' + c;
            piece.innerHTML = designHTML;
            loaderContainer.appendChild(piece);
          }
        }

        window.addEventListener('load', function () {
          // Give user 1.5s to appreciate the intricate 3D CSS rendering
          setTimeout(() => {
            loaderContainer.classList.add('loaded');
            // Longest delay (0.75s) + animation (1.2s) = 1.95s
            // Safely remove after visual completion
            setTimeout(() => {
              loaderContainer.classList.add('hidden');
              loaderContainer.remove();
            }, 2100);
          }, 1500);
        });
      }
    })();
  </script>
</body>

</html>
