<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <meta property="og:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta property="og:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta name="twitter:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Google Fonts: Tajawal, Almarai, Montserrat, Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Global Loading Screen - 10-Panel Cohesive Cinematic Animation -->
  <div id="global-loader" class="multi-panel-loader">

    <!-- 10 Panels (5 Rows x 2 Columns) -->
    <!-- Row 1 -->
    <div class="panel panel-left row-1"></div>
    <div class="panel panel-right row-1"></div>

    <!-- Row 2 -->
    <div class="panel panel-left row-2"></div>
    <div class="panel panel-right row-2"></div>

    <!-- Row 3 (Center) -->
    <div class="panel panel-left row-3"></div>
    <div class="panel panel-right row-3"></div>

    <!-- Row 4 -->
    <div class="panel panel-left row-4"></div>
    <div class="panel panel-right row-4"></div>

    <!-- Row 5 -->
    <div class="panel panel-left row-5"></div>
    <div class="panel panel-right row-5"></div>

    <!-- Center Content: Logo and LUX BOX sign overlay -->
    <div class="panel-loader-content" id="loader-content">
      <div class="loader-logo-container">
        <!-- Gold pulsing ring for realistic luxury feel -->
        <div class="golden-rings">
          <div class="ring-outer"></div>
          <div class="ring-inner"></div>
          <div class="diamond-center"></div>
        </div>
      </div>
      <h1 class="loader-title">LUX BOX</h1>
      <p class="loader-subtitle" dir="rtl">بوابة الفخامة تفتح الآن...</p>
    </div>

    <style>
      /* Main Background Container */
      .multi-panel-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        overflow: hidden;
        background-color: transparent;
        /* No black background */
      }

      .multi-panel-loader.hidden {
        visibility: hidden;
        transition: visibility 0s linear 3s;
      }

      /* Base style for the 10 door panels */
      .panel {
        position: absolute;
        width: 50vw;
        height: 20vh;
        /* Using the exact decor image requested so it looks like one huge piece */
        background-color: #0b281f;
        /* Fallback */
        background-image:
          linear-gradient(rgba(11, 40, 31, 0.6), rgba(7, 26, 20, 0.8)),
          url('/assets/store-interior.jpg');
        background-size: 100vw 100vh;
        background-attachment: fixed;
        /* This makes the background continuous across all panels */
        background-position: center;
        background-repeat: no-repeat;
        /* Increase duration for a slower, more majestic cinematic feel */
        transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        z-index: 1;

        /* Subtle inner shadow for a tiny hint of depth on the full frame, but NO lines/borders inside */
      }

      /* Add full-screen outer shadow, but not between panels */
      .panel-left {
        left: 0;
        box-shadow: inset 10px 0 20px rgba(0, 0, 0, 0.5);
      }

      .panel-right {
        right: 0;
        box-shadow: inset -10px 0 20px rgba(0, 0, 0, 0.5);
      }

      .row-1 {
        top: 0;
        box-shadow: inset 0 10px 20px rgba(0, 0, 0, 0.5);
      }

      .row-5 {
        top: 80vh;
        box-shadow: inset 0 -10px 20px rgba(0, 0, 0, 0.5);
      }

      .panel-left.row-1 {
        box-shadow: inset 10px 10px 20px rgba(0, 0, 0, 0.5);
      }

      .panel-right.row-1 {
        box-shadow: inset -10px 10px 20px rgba(0, 0, 0, 0.5);
      }

      .panel-left.row-5 {
        box-shadow: inset 10px -10px 20px rgba(0, 0, 0, 0.5);
      }

      .panel-right.row-5 {
        box-shadow: inset -10px -10px 20px rgba(0, 0, 0, 0.5);
      }

      /* Positioning the middle Rows */
      .row-2 {
        top: 20vh;
      }

      .row-3 {
        top: 40vh;
      }

      .row-4 {
        top: 60vh;
      }

      /* --- Animation Sequence --- */
      /* User requested: 1, 2, 2, 2, 2, 1 open sequence.
         We will open:
         - Row 3 Left first (1)
         - Row 3 Right + Row 2 Left (2)
         - Row 2 Right + Row 4 Left (2)
         - Row 4 Right + Row 1 Left (2)
         - Row 1 Right + Row 5 Left (2)
         - Row 5 Right last (1)
         This creates a beautiful diagonal sweeping ripple effect.
      */

      .multi-panel-loader.loaded .panel-left.row-3 {
        transition-delay: 0.0s;
      }

      .multi-panel-loader.loaded .panel-right.row-3,
      .multi-panel-loader.loaded .panel-left.row-2 {
        transition-delay: 0.2s;
      }

      .multi-panel-loader.loaded .panel-right.row-2,
      .multi-panel-loader.loaded .panel-left.row-4 {
        transition-delay: 0.4s;
      }

      .multi-panel-loader.loaded .panel-right.row-4,
      .multi-panel-loader.loaded .panel-left.row-1 {
        transition-delay: 0.6s;
      }

      .multi-panel-loader.loaded .panel-right.row-1,
      .multi-panel-loader.loaded .panel-left.row-5 {
        transition-delay: 0.8s;
      }

      .multi-panel-loader.loaded .panel-right.row-5 {
        transition-delay: 1.0s;
      }

      /* The Opening Translations */
      .multi-panel-loader.loaded .panel-left {
        transform: translateX(-100%);
      }

      .multi-panel-loader.loaded .panel-right {
        transform: translateX(100%);
      }

      /* Center Content Overlay */
      .panel-loader-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: opacity 0.4s ease, transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        width: 100%;
        padding: 0 20px;
        filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.8));
      }

      /* Logo and text fade out slightly before the panel animations start */
      .multi-panel-loader.loaded .panel-loader-content {
        opacity: 0;
        transform: translate(-50%, -55%) scale(0.9);
        filter: blur(8px);
      }

      /* Modern Gold Rings */
      .golden-rings {
        position: relative;
        width: 80px;
        height: 80px;
        margin: 0 auto 24px;
      }

      .ring-outer {
        position: absolute;
        inset: 0;
        border: 2px solid rgba(212, 175, 55, 0.15);
        border-radius: 50%;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
      }

      .ring-inner {
        position: absolute;
        inset: 0;
        border: 2px solid transparent;
        border-top-color: #D4AF37;
        border-left-color: #D4AF37;
        border-radius: 50%;
        animation: spin 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      }

      .diamond-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(45deg);
        width: 16px;
        height: 16px;
        background-color: #D4AF37;
        animation: diamond-pulse 2s ease-in-out infinite;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }

        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes diamond-pulse {

        0%,
        100% {
          transform: translate(-50%, -50%) rotate(45deg) scale(0.85);
          opacity: 0.8;
        }

        50% {
          transform: translate(-50%, -50%) rotate(45deg) scale(1.15);
          opacity: 1;
          box-shadow: 0 0 25px rgba(212, 175, 55, 1);
        }
      }

      /* LUX BOX GOLD SIGN */
      .loader-title {
        font-family: 'Playfair Display', serif;
        font-size: 38px;
        font-weight: 600;
        color: #dcb348;
        letter-spacing: 0.25em;
        margin: 0;
        text-transform: uppercase;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.9);
        animation: shimmer 3s infinite linear;
        background: linear-gradient(to right, #dcb348, #FFF, #dcb348);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% auto;
      }

      .loader-subtitle {
        font-family: 'Tajawal', sans-serif;
        color: rgba(255, 255, 255, 0.8);
        font-size: 16px;
        letter-spacing: 0.15em;
        font-weight: 300;
        margin-top: 16px;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 1);
      }

      @keyframes shimmer {
        to {
          background-position: 200% center;
        }
      }
    </style>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Script to trigger the 10-panel cinematic split -->
  <script>
    window.addEventListener('load', function () {
      const loader = document.getElementById('global-loader');

      if (loader) {
        // Wait slightly longer for dramatic effect so user sees the CSS design
        setTimeout(() => {
          // Trigger the sequence opening
          loader.classList.add('loaded');

          // Wait until the longest animation finishes (0.6s delay + 1.2s duration = 1.8s)
          setTimeout(() => {
            loader.classList.add('hidden');
            loader.remove();
          }, 2000);
        }, 1200);
      }
    });
  </script>
</body>

</html>
