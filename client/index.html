<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <meta property="og:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta property="og:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lux Box - High-End E-Commerce Experience" />
  <meta name="twitter:description"
    content="A digital twin of luxury shopping. Premium perfumes, accessories, and gifts." />

  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Google Fonts: Tajawal, Almarai, Montserrat, Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Tajawal:wght@200;300;400;500;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Global Loading Screen - Physical Shelf Design -->
  <div id="global-loader" class="shelf-loader-bg">
    <!-- Center Content: The Arch and Shelves -->
    <div class="shelf-loader-container" id="loader-content">

      <!-- Top "LUX BOX" Sign -->
      <div class="shelf-sign">LUX BOX</div>

      <!-- The Shelves inside the arch -->
      <div class="shelf-rack">
        <!-- Shelf 1 -->
        <div class="shelf-row">
          <div class="shelf-board"></div>
        </div>
        <!-- Shelf 2 -->
        <div class="shelf-row">
          <div class="shelf-board"></div>
        </div>
        <!-- Shelf 3 -->
        <div class="shelf-row">
          <div class="shelf-board"></div>
        </div>
        <!-- Shelf 4 -->
        <div class="shelf-row">
          <div class="shelf-board"></div>
        </div>
        <!-- Shelf 5 -->
        <div class="shelf-row">
          <div class="shelf-board"></div>
        </div>
      </div>

    </div>

    <!-- The Left and Right Doors (used to wipe away the loader) -->
    <div class="shelf-door shelf-door-left" id="door-left"></div>
    <div class="shelf-door shelf-door-right" id="door-right"></div>

    <style>
      /* Main Background outside the arch */
      .shelf-loader-bg {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f6f3f0;
        /* Off-white wall color from image */
        overflow: hidden;
      }

      .shelf-loader-bg.hidden {
        visibility: hidden;
        transition: visibility 0s linear 1.2s;
      }

      /* The Arch Container */
      .shelf-loader-container {
        position: relative;
        width: 100%;
        max-width: 500px;
        height: 85vh;
        background-color: #e6eee3;
        /* Light green inside the arch */
        border-top-left-radius: 250px;
        border-top-right-radius: 250px;
        box-shadow: inset 0 20px 40px rgba(0, 0, 0, 0.05);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 60px;
        /* Custom green ribbed border effect from the image */
        border: 20px solid #235c3e;
        /* Dark green */
        border-bottom: none;
        overflow: hidden;
        z-index: 2;
        transition: opacity 0.4s ease, transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
      }

      /* "LUX BOX" Gold Sign */
      .shelf-sign {
        font-family: 'Montserrat', sans-serif;
        font-size: 38px;
        font-weight: 800;
        color: #dcb348;
        /* Gold color */
        letter-spacing: 0.1em;
        margin-bottom: 40px;
        text-align: center;
        /* 3D Gold Text Effect */
        text-shadow:
          0 1px 0 #b38b22,
          0 2px 0 #b38b22,
          0 3px 0 #b38b22,
          0 4px 6px rgba(0, 0, 0, 0.4);
        z-index: 10;
        /* Pulse Animation to indicate loading */
        animation: signPulse 2s infinite ease-in-out;
      }

      @keyframes signPulse {

        0%,
        100% {
          filter: brightness(1);
          text-shadow: 0 1px 0 #b38b22, 0 2px 0 #b38b22, 0 3px 0 #b38b22, 0 4px 6px rgba(0, 0, 0, 0.4);
        }

        50% {
          filter: brightness(1.2);
          text-shadow: 0 1px 0 #b38b22, 0 2px 0 #b38b22, 0 3px 0 #b38b22, 0 4px 12px rgba(220, 179, 72, 0.6);
        }
      }

      /* The Shelves Area */
      .shelf-rack {
        flex: 1;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        padding-bottom: 20px;
      }

      .shelf-row {
        position: relative;
        width: 90%;
        margin: 0 auto;
        height: 60px;
        /* Space above shelf */
        display: flex;
        align-items: flex-end;
      }

      /* The actual solid green shelf */
      .shelf-board {
        width: 100%;
        height: 14px;
        background-color: #235c3e;
        /* Dark green matching border */
        border-radius: 4px;
        position: relative;
        /* Under-shelf lighting */
        box-shadow: 0 5px 15px rgba(255, 255, 255, 0.8), 0 10px 20px rgba(0, 0, 0, 0.05);
      }

      .shelf-board::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        right: 0;
        height: 2px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 0 0 4px 4px;
        filter: blur(1px);
      }

      /* Doors to wipe away the loader */
      .shelf-door {
        position: absolute;
        top: 0;
        width: 50vw;
        height: 100vh;
        background-color: #f6f3f0;
        /* Matches wall */
        z-index: 5;
        transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
      }

      .shelf-door-left {
        left: 0;
        transform: translateX(-100%);
        /* Start open (hidden), close to cover */
      }

      .shelf-door-right {
        right: 0;
        transform: translateX(100%);
      }

      /* Animation classes */
      .shelf-loader-bg.closing .shelf-door-left {
        transform: translateX(0);
        /* Cover screen */
      }

      .shelf-loader-bg.closing .shelf-door-right {
        transform: translateX(0);
      }

      .shelf-loader-bg.closing .shelf-loader-container {
        transform: scale(0.95) translateY(20px);
        opacity: 0;
      }
    </style>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Script to trigger the cinematic shelf split -->
  <script>
    window.addEventListener('load', function () {
      const loader = document.getElementById('global-loader');

      if (loader) {
        // Wait a bit so user sees the shelf design
        setTimeout(() => {
          // Trigger doors wiping inwards to cover the shelf
          loader.classList.add('closing');

          // Once doors are closed, hide the loader fully
          setTimeout(() => {
            loader.classList.add('hidden');
            loader.remove();
          }, 1200);
        }, 800);
      }
    });
  </script>
</body>

</html>
